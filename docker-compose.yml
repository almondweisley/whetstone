services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whetstone}
      POSTGRES_USER: ${POSTGRES_USER:-whetstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whetstone}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Build this once before using the Docker judge. The Celery worker itself is
  # documented as a local command so it can use the host Docker socket safely.
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: whetstone-sandbox:latest
    profiles: ["sandbox"]
    command: ["python", "--version"]

volumes:
  postgres_data:
  redis_data:
